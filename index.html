<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurora — Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <style>
    :root {
      --night: #06080f;
      --deep: #0b0f1a;
      --surface: rgba(15, 20, 35, 0.7);
      --glass: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.08);
      --aurora-green: #3dffa0;
      --aurora-teal: #00e5cc;
      --aurora-purple: #b06aff;
      --aurora-blue: #4fa8ff;
      --text-primary: rgba(230, 235, 245, 0.95);
      --text-secondary: rgba(180, 190, 210, 0.7);
      --text-muted: rgba(130, 145, 170, 0.55);
      --accent: #3dffa0;
      --accent-glow: rgba(61, 255, 160, 0.15);
      --sidebar-width: 260px;
      --header-height: 320px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--night);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* HEADER */
    #site-header {
      position: relative;
      width: 100%;
      height: var(--header-height);
      overflow: hidden;
      cursor: pointer;
    }

    #aurora-canvas {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .header-content {
      position: relative;
      z-index: 10;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      text-align: center;
      padding: 0 20px;
    }

    .blog-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 5vw, 4rem);
      font-weight: 300;
      letter-spacing: 0.12em;
      color: #fff;
      text-shadow:
        0 0 40px rgba(61, 255, 160, 0.5),
        0 0 80px rgba(176, 106, 255, 0.3),
        0 2px 4px rgba(0,0,0,0.5);
    }

    .blog-subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      font-weight: 300;
      letter-spacing: 0.3em;
      color: rgba(61, 255, 160, 0.7);
      text-transform: uppercase;
    }

    .header-fade {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 80px;
      background: linear-gradient(to bottom, transparent, var(--night));
      z-index: 5;
    }

    /* LAYOUT */
    #layout {
      display: flex;
      min-height: calc(100vh - var(--header-height));
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 24px 60px;
      gap: 32px;
      align-items: flex-start;
    }

    /* SIDEBAR */
    #sidebar {
      width: var(--sidebar-width);
      flex-shrink: 0;
      position: sticky;
      top: 32px;
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .sidebar-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      overflow: hidden;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }

    .profile-card {
      padding: 28px 22px;
      text-align: center;
    }

    .profile-avatar {
      width: 72px;
      height: 72px;
      border-radius: 50%;
      margin: 0 auto 14px;
      background: linear-gradient(135deg, var(--aurora-teal), var(--aurora-purple));
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 300;
      color: #fff;
      box-shadow: 0 0 24px rgba(61, 255, 160, 0.2);
      overflow: hidden;
    }

    .profile-avatar img { width: 100%; height: 100%; object-fit: cover; }

    .profile-name {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.25rem;
      font-weight: 400;
      color: var(--text-primary);
      letter-spacing: 0.04em;
      margin-bottom: 6px;
    }

    .profile-bio {
      font-size: 0.75rem;
      color: var(--text-secondary);
      line-height: 1.6;
      font-weight: 300;
    }

    .profile-stats {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 18px;
      padding-top: 18px;
      border-top: 1px solid var(--glass-border);
    }

    .stat { text-align: center; }

    .stat-number {
      font-family: 'DM Mono', monospace;
      font-size: 1.1rem;
      color: var(--aurora-green);
    }

    .stat-label {
      font-size: 0.65rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-top: 2px;
    }

    .categories-card { padding: 22px; }

    .card-heading {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 14px;
    }

    .category-list { list-style: none; display: flex; flex-direction: column; gap: 4px; }

    .category-item a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 8px 12px;
      border-radius: 8px;
      text-decoration: none;
      color: var(--text-secondary);
      font-size: 0.82rem;
      font-weight: 300;
      transition: all 0.2s;
      cursor: pointer;
    }

    .category-item a:hover {
      background: var(--glass);
      color: var(--text-primary);
      padding-left: 16px;
    }

    .category-item a.active {
      background: var(--accent-glow);
      color: var(--aurora-green);
    }

    .category-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    /* MAIN CONTENT */
    #main-content {
      flex: 1;
      min-width: 0;
      padding-top: 32px;
    }

    .section-header {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-bottom: 28px;
    }

    .section-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.6rem;
      font-weight: 300;
      letter-spacing: 0.05em;
      color: var(--text-primary);
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(to right, var(--glass-border), transparent);
    }

    .section-count {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    /* POST CARDS */
    .post-grid {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .post-card {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 14px;
      padding: 26px 28px;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      display: block;
      transition: all 0.3s ease;
      position: relative;
      overflow: hidden;
      animation: fadeInUp 0.5s ease both;
    }

    .post-card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(61,255,160,0.03), transparent 60%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .post-card:hover {
      border-color: rgba(61, 255, 160, 0.2);
      transform: translateY(-3px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 20px rgba(61,255,160,0.05);
    }

    .post-card:hover::before { opacity: 1; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .post-category {
      font-family: 'DM Mono', monospace;
      font-size: 0.65rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--aurora-green);
      background: rgba(61,255,160,0.1);
      padding: 3px 10px;
      border-radius: 20px;
      border: 1px solid rgba(61,255,160,0.2);
    }

    .post-date {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-muted);
    }

    .post-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.35rem;
      font-weight: 400;
      line-height: 1.4;
      color: var(--text-primary);
      margin-bottom: 10px;
      letter-spacing: 0.02em;
      transition: color 0.2s;
    }

    .post-card:hover .post-title { color: #fff; }

    .post-preview {
      font-size: 0.83rem;
      font-weight: 300;
      color: var(--text-secondary);
      line-height: 1.7;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .post-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--glass-border);
    }

    .post-tags {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .post-tag {
      font-size: 0.68rem;
      color: var(--text-muted);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      padding: 2px 8px;
      border-radius: 4px;
    }

    .post-read-more {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem;
      color: var(--aurora-green);
      opacity: 0;
      transition: opacity 0.2s;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .post-card:hover .post-read-more { opacity: 1; }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }

    .empty-state-icon {
      font-size: 2.5rem;
      margin-bottom: 16px;
      opacity: 0.4;
    }

    .empty-state p {
      font-size: 0.85rem;
      font-weight: 300;
      line-height: 1.7;
    }

    .empty-state code {
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      padding: 2px 8px;
      border-radius: 4px;
      color: var(--aurora-green);
    }

    .filter-btn {
      font-family: 'DM Mono', monospace;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 6px 14px;
      border-radius: 20px;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.2s;
    }

    .filter-btn:hover, .filter-btn.active {
      border-color: rgba(61,255,160,0.3);
      color: var(--aurora-green);
      background: rgba(61,255,160,0.08);
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(61,255,160,0.2); border-radius: 3px; }

    @media (max-width: 768px) {
      #layout { flex-direction: column; padding: 0 16px 40px; }
      #sidebar { width: 100%; position: static; }
      :root { --header-height: 220px; }
    }
  </style>
</head>
<body>

  <header id="site-header">
    <canvas id="aurora-canvas"></canvas>
    <div class="header-content">
      <h1 class="blog-title">Seolock's Space</h1>
      <p class="blog-subtitle">for gospel live, for gospel die</p>
    </div>
    <div class="header-fade"></div>
  </header>

  <div id="layout">

    <aside id="sidebar">
      <div class="sidebar-card profile-card">
        <div class="profile-avatar" id="avatar-el">S</div>
        <div class="profile-name" id="sidebar-name">Seolock</div>
        <div class="profile-bio" id="sidebar-bio">Writer · Researcher · Dreamer</div>
        <div class="profile-stats">
          <div class="stat">
            <div class="stat-number" id="stat-topics">—</div>
            <div class="stat-label">Topics</div>
          </div>
          <div class="stat">
            <div class="stat-number" id="stat-posts">—</div>
            <div class="stat-label">Posts</div>
          </div>
        </div>
      </div>

      <div class="sidebar-card categories-card">
        <div class="card-heading">Categories</div>
        <ul class="category-list" id="category-list">
          <li class="category-item">
            <a href="#" class="active" data-cat="all">
              <span>All Posts</span>
              <span class="category-count" id="count-all">0</span>
            </a>
          </li>
        </ul>
      </div>
    </aside>

    <main id="main-content">
      <div class="section-header">
        <h2 class="section-title">Recent Posts</h2>
        <div class="section-line"></div>
        <span class="section-count" id="post-count-label">loading…</span>
      </div>
      <div class="post-grid" id="post-grid"></div>
    </main>

  </div>

  <script>
    /* ── Aurora Canvas ── */
    (function(){
      const canvas = document.getElementById('aurora-canvas');
      const ctx = canvas.getContext('2d');
      let W, H, stars=[], time=0;
      function resize(){
        W=canvas.width=canvas.offsetWidth;
        H=canvas.height=canvas.offsetHeight;
        stars=[];
        const n=Math.floor(W*H/3000);
        for(let i=0;i<n;i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+0.2,phase:Math.random()*Math.PI*2,speed:Math.random()*0.008+0.002});
      }
      function draw(){
        time+=0.016;
        const bg=ctx.createLinearGradient(0,0,0,H);
        bg.addColorStop(0,'#030510'); bg.addColorStop(0.5,'#070c1a'); bg.addColorStop(1,'#0a0f1e');
        ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
        const bands=[
          {c1:'rgba(0,220,140,',c2:'rgba(0,180,200,',xo:0.3,amp:55,fr:0.9},
          {c1:'rgba(100,60,240,',c2:'rgba(180,80,255,',xo:0.6,amp:45,fr:1.2},
          {c1:'rgba(30,200,180,',c2:'rgba(60,130,255,',xo:0.15,amp:38,fr:0.7},
        ];
        bands.forEach(({c1,c2,xo,amp,fr})=>{
          for(let b=0;b<4;b++){
            const baseY=H*(0.15+b*0.06);
            const alpha=(0.04-b*0.008)*(0.6+0.4*Math.sin(time*0.3+b));
            ctx.beginPath(); ctx.moveTo(0,baseY);
            for(let x=0;x<=W;x+=4){
              const y=baseY+Math.sin(x*0.005*fr+time*0.4+xo*10)*amp+Math.sin(x*0.009*fr+time*0.25+b)*(amp*0.5)+Math.cos(x*0.003+time*0.15)*(amp*0.3);
              ctx.lineTo(x,y);
            }
            ctx.lineTo(W,baseY+H*0.25); ctx.lineTo(0,baseY+H*0.25); ctx.closePath();
            const g=ctx.createLinearGradient(W*xo,0,W*(1-xo),H*0.4);
            g.addColorStop(0,c1+alpha+')'); g.addColorStop(0.5,c2+(alpha*1.5)+')'); g.addColorStop(1,c1+'0)');
            ctx.fillStyle=g; ctx.fill();
          }
        });
        stars.forEach(s=>{
          const tw=0.3+0.7*(0.5+0.5*Math.sin(time*s.speed*60+s.phase));
          ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
          ctx.fillStyle=`rgba(220,235,255,${tw*0.9})`; ctx.fill();
        });
        requestAnimationFrame(draw);
      }
      window.addEventListener('resize',resize); resize(); draw();
    })();

    /* ── Posts Manifest ── */
    let POSTS_MANIFEST = [];

    /* ── Render ── */
    (async function init(){
      try {
        const response = await fetch('posts/posts.json');
        if (!response.ok) throw new Error('목록을 불러오지 못했습니다.');
        POSTS_MANIFEST = await response.json();
      } catch (error) {
        console.error("포스트 매니페스트 로드 에러:", error);
        showEmpty();
        return;
      }

      if (POSTS_MANIFEST.length === 0) {
        showEmpty();
        document.getElementById('stat-posts').textContent = '0';
        document.getElementById('stat-topics').textContent = '0';
        document.getElementById('post-count-label').textContent = '0 posts';
        document.getElementById('count-all').textContent = '0';
        return;
      }

      const catMap = {};
      POSTS_MANIFEST.forEach(p => {
        const cat = p.category || 'Uncategorized';
        catMap[cat] = (catMap[cat] || 0) + 1;
      });

      document.getElementById('stat-posts').textContent = POSTS_MANIFEST.length;
      document.getElementById('stat-topics').textContent = Object.keys(catMap).length;
      document.getElementById('count-all').textContent = POSTS_MANIFEST.length;
      document.getElementById('post-count-label').textContent = `${POSTS_MANIFEST.length} posts`;

      const catList = document.getElementById('category-list');
      Object.entries(catMap).forEach(([cat, cnt]) => {
        const li = document.createElement('li');
        li.className = 'category-item';
        li.innerHTML = `<a href="#" data-cat="${cat}"><span>${cat}</span><span class="category-count">${cnt}</span></a>`;
        catList.appendChild(li);
      });

      document.getElementById('category-list').addEventListener('click', e => {
        const a = e.target.closest('a[data-cat]');
        if (!a) return;
        e.preventDefault();
        document.querySelectorAll('.category-item a').forEach(x => x.classList.remove('active'));
        a.classList.add('active');
        renderCards(a.dataset.cat);
      });

      renderCards('all');
    })();

    function renderCards(filter) {
      const grid = document.getElementById('post-grid');
      const posts = filter === 'all'
        ? POSTS_MANIFEST
        : POSTS_MANIFEST.filter(p => (p.category || 'Uncategorized') === filter);

      if (posts.length === 0) { showEmpty(); return; }

      grid.innerHTML = '';
      posts.forEach((post, i) => {
        const card = document.createElement('a');
        card.className = 'post-card';
        card.href = `post.html?file=${encodeURIComponent(post.file)}`;
        card.style.animationDelay = `${i * 0.07}s`;

        const tags = (post.tags || []).map(t => `<span class="post-tag">#${t}</span>`).join('');
        const dateStr = post.date
          ? new Date(post.date).toLocaleDateString('ko-KR', {year:'numeric',month:'long',day:'numeric'})
          : '';

        card.innerHTML = `
          <div class="post-meta">
            ${post.category ? `<span class="post-category">${post.category}</span>` : ''}
            ${dateStr ? `<span class="post-date">${dateStr}</span>` : ''}
          </div>
          <div class="post-title">${post.title || '제목 없음'}</div>
          <div class="post-preview">${post.preview || '내용 미리보기...'}</div>
          <div class="post-footer">
            <div class="post-tags">${tags}</div>
            <span class="post-read-more">Read →</span>
          </div>
        `;
        grid.appendChild(card);
      });
    }

    function showEmpty() {
      document.getElementById('post-grid').innerHTML = `
        <div class="empty-state">
          <p>No Posts<br>
        </div>`;
    }
  </script>
</body>
</html>
