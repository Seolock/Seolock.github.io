<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aurora — Post</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
  <style>
    :root {
      --night: #06080f;
      --deep: #0b0f1a;
      --glass: rgba(255, 255, 255, 0.04);
      --glass-border: rgba(255, 255, 255, 0.08);
      --aurora-green: #3dffa0;
      --aurora-teal: #00e5cc;
      --aurora-purple: #b06aff;
      --aurora-blue: #4fa8ff;
      --text-primary: rgba(230, 235, 245, 0.95);
      --text-secondary: rgba(180, 190, 210, 0.7);
      --text-muted: rgba(130, 145, 170, 0.55);
      --accent-glow: rgba(61, 255, 160, 0.15);
      --header-height: 320px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--night);
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* HEADER */
    #site-header {
      position: relative;
      width: 100%;
      height: var(--header-height);
      overflow: hidden;
      cursor: pointer;
    }

    #aurora-canvas { position: absolute; inset: 0; width: 100%; height: 100%; }

    .header-content {
      position: relative; z-index: 10;
      height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 10px; text-align: center; padding: 0 20px;
    }

    .blog-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2.4rem, 5vw, 4rem);
      font-weight: 300; letter-spacing: 0.12em; color: #fff;
      text-shadow: 0 0 40px rgba(61,255,160,0.5), 0 0 80px rgba(176,106,255,0.3), 0 2px 4px rgba(0,0,0,0.5);
    }

    .blog-subtitle {
      font-family: 'DM Mono', monospace;
      font-size: 0.7rem; letter-spacing: 0.3em;
      color: rgba(61,255,160,0.7); text-transform: uppercase;
    }

    .header-fade {
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 80px; background: linear-gradient(to bottom, transparent, var(--night)); z-index: 5;
    }

    /* LAYOUT - 중앙 정렬 및 넓은 가로폭 적용 */
    #layout {
      display: flex;
      min-height: calc(100vh - var(--header-height));
      max-width: 960px; /* 글을 읽기 편한 최대 넓이 지정 */
      margin: 0 auto;
      padding: 0 24px 60px; 
      align-items: flex-start;
      justify-content: center;
    }

    /* MAIN CONTENT */
    #main-content { 
      flex: 1; 
      width: 100%;
      min-width: 0; 
      padding-top: 32px; 
    }

    /* Back button */
    .back-btn {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: 'DM Mono', monospace; font-size: 0.72rem;
      letter-spacing: 0.1em; text-transform: uppercase;
      color: var(--text-muted); text-decoration: none;
      padding: 8px 14px; border-radius: 8px;
      border: 1px solid var(--glass-border);
      background: var(--glass);
      transition: all 0.2s; margin-bottom: 28px;
    }

    .back-btn:hover {
      color: var(--aurora-green);
      border-color: rgba(61,255,160,0.3);
      background: rgba(61,255,160,0.05);
    }

    /* Post wrapper */
    .post-wrapper {
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 16px;
      overflow: hidden;
      animation: fadeIn 0.4s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .post-header {
      padding: 40px 44px 32px;
      border-bottom: 1px solid var(--glass-border);
      background: linear-gradient(135deg, rgba(61,255,160,0.03), rgba(176,106,255,0.03));
    }

    .post-header-meta {
      display: flex; align-items: center; gap: 12px; margin-bottom: 18px;
    }

    .post-category-badge {
      font-family: 'DM Mono', monospace; font-size: 0.65rem;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--aurora-green);
      background: rgba(61,255,160,0.1);
      padding: 3px 12px; border-radius: 20px;
      border: 1px solid rgba(61,255,160,0.2);
    }

    .post-header-date {
      font-family: 'DM Mono', monospace; font-size: 0.72rem; color: var(--text-muted);
    }

    .post-header-title {
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(1.8rem, 4vw, 2.6rem);
      font-weight: 300; line-height: 1.3;
      letter-spacing: 0.02em; color: #fff;
      margin-bottom: 14px;
    }

    .post-header-tags {
      display: flex; gap: 6px; flex-wrap: wrap;
    }

    .post-header-tag {
      font-size: 0.7rem; color: var(--text-muted);
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.07);
      padding: 3px 10px; border-radius: 4px;
    }

    /* Markdown body */
    .post-body {
      padding: 40px 44px;
      line-height: 1.85;
      font-size: 0.95rem; 
      font-weight: 300;
      color: var(--text-secondary);
    }

    .post-body h1, .post-body h2, .post-body h3,
    .post-body h4, .post-body h5, .post-body h6 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 400;
      color: var(--text-primary);
      margin: 2.2em 0 0.8em;
      line-height: 1.3;
      letter-spacing: 0.02em;
    }

    .post-body h1 { font-size: 1.9rem; }
    .post-body h2 {
      font-size: 1.5rem;
      padding-bottom: 10px;
      border-bottom: 1px solid var(--glass-border);
    }
    .post-body h3 { font-size: 1.2rem; color: rgba(230,235,245,0.85); }

    .post-body p { margin-bottom: 1.4em; }

    .post-body a {
      color: var(--aurora-green);
      text-decoration: none;
      border-bottom: 1px solid rgba(61,255,160,0.3);
      transition: border-color 0.2s;
    }

    .post-body a:hover { border-color: var(--aurora-green); }

    .post-body strong { font-weight: 500; color: var(--text-primary); }
    .post-body em { font-style: italic; color: rgba(200,210,230,0.8); }

    .post-body ul, .post-body ol {
      padding-left: 1.5em; margin-bottom: 1.4em;
    }

    .post-body li { margin-bottom: 0.4em; }

    .post-body blockquote {
      border-left: 2px solid var(--aurora-green);
      padding: 12px 20px;
      margin: 1.6em 0;
      background: rgba(61,255,160,0.04);
      border-radius: 0 8px 8px 0;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.1rem;
      font-style: italic;
      color: rgba(200,215,235,0.8);
    }

    .post-body code {
      font-family: 'DM Mono', monospace;
      font-size: 0.82rem;
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--glass-border);
      padding: 2px 7px;
      border-radius: 4px;
      color: var(--aurora-teal);
    }

    .post-body pre {
      background: rgba(0,0,0,0.4);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 20px 24px;
      overflow-x: auto;
      margin: 1.6em 0;
    }

    .post-body pre code {
      background: none; border: none; padding: 0;
      font-size: 0.82rem; color: rgba(180,200,230,0.9);
    }

    .post-body img {
      max-width: 100%; border-radius: 10px;
      margin: 1.6em 0;
      border: 1px solid var(--glass-border);
    }

    .post-body hr {
      border: none;
      border-top: 1px solid var(--glass-border);
      margin: 2.5em 0;
    }

    .post-body table {
      width: 100%; border-collapse: collapse;
      margin: 1.6em 0; font-size: 0.85rem;
    }

    .post-body th, .post-body td {
      padding: 10px 14px;
      border: 1px solid var(--glass-border);
      text-align: left;
    }

    .post-body th {
      background: rgba(61,255,160,0.06);
      color: var(--text-primary);
      font-weight: 500;
      font-family: 'DM Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.05em;
    }

    .post-body tr:nth-child(even) td { background: rgba(255,255,255,0.02); }

    /* Loading / error */
    .post-loading {
      padding: 60px 44px; text-align: center;
      color: var(--text-muted); font-size: 0.85rem;
    }

    .post-error {
      padding: 40px 44px;
      color: rgba(255,100,100,0.7);
      font-size: 0.85rem;
      font-family: 'DM Mono', monospace;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(61,255,160,0.2); border-radius: 3px; }

    @media (max-width: 768px) {
      #layout { padding: 0 16px 40px; }
      :root { --header-height: 220px; }
      .post-header { padding: 28px 22px 22px; }
      .post-body { padding: 28px 22px; }
    }
  </style>
</head>
<body>

  <header id="site-header" onclick="location.href='index.html'">
    <canvas id="aurora-canvas"></canvas>
    <div class="header-content">
      <h1 class="blog-title">Aurora</h1>
      <p class="blog-subtitle">thoughts &amp; writings</p>
    </div>
    <div class="header-fade"></div>
  </header>

  <div id="layout">
    <main id="main-content">
      <a class="back-btn" href="index.html">← Back to Home</a>
      <div class="post-wrapper" id="post-wrapper">
        <div class="post-loading">loading…</div>
      </div>
    </main>
  </div>

  <script>
    /* ── Aurora Canvas ── */
    (function(){
      const canvas=document.getElementById('aurora-canvas');
      const ctx=canvas.getContext('2d');
      let W,H,stars=[],time=0;
      function resize(){
        W=canvas.width=canvas.offsetWidth; H=canvas.height=canvas.offsetHeight;
        stars=[];
        const n=Math.floor(W*H/3000);
        for(let i=0;i<n;i++) stars.push({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+0.2,phase:Math.random()*Math.PI*2,speed:Math.random()*0.008+0.002});
      }
      function draw(){
        time+=0.016;
        const bg=ctx.createLinearGradient(0,0,0,H);
        bg.addColorStop(0,'#030510'); bg.addColorStop(0.5,'#070c1a'); bg.addColorStop(1,'#0a0f1e');
        ctx.fillStyle=bg; ctx.fillRect(0,0,W,H);
        [{c1:'rgba(0,220,140,',c2:'rgba(0,180,200,',xo:0.3,amp:55,fr:0.9},
         {c1:'rgba(100,60,240,',c2:'rgba(180,80,255,',xo:0.6,amp:45,fr:1.2},
         {c1:'rgba(30,200,180,',c2:'rgba(60,130,255,',xo:0.15,amp:38,fr:0.7}
        ].forEach(({c1,c2,xo,amp,fr})=>{
          for(let b=0;b<4;b++){
            const baseY=H*(0.15+b*0.06);
            const alpha=(0.04-b*0.008)*(0.6+0.4*Math.sin(time*0.3+b));
            ctx.beginPath(); ctx.moveTo(0,baseY);
            for(let x=0;x<=W;x+=4){
              const y=baseY+Math.sin(x*0.005*fr+time*0.4+xo*10)*amp+Math.sin(x*0.009*fr+time*0.25+b)*(amp*0.5)+Math.cos(x*0.003+time*0.15)*(amp*0.3);
              ctx.lineTo(x,y);
            }
            ctx.lineTo(W,baseY+H*0.25); ctx.lineTo(0,baseY+H*0.25); ctx.closePath();
            const g=ctx.createLinearGradient(W*xo,0,W*(1-xo),H*0.4);
            g.addColorStop(0,c1+alpha+')'); g.addColorStop(0.5,c2+(alpha*1.5)+')'); g.addColorStop(1,c1+'0)');
            ctx.fillStyle=g; ctx.fill();
          }
        });
        stars.forEach(s=>{
          const tw=0.3+0.7*(0.5+0.5*Math.sin(time*s.speed*60+s.phase));
          ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
          ctx.fillStyle=`rgba(220,235,255,${tw*0.9})`; ctx.fill();
        });
        requestAnimationFrame(draw);
      }
      window.addEventListener('resize',resize); resize(); draw();
    })();

    /* ── Posts Manifest ── */
    let POSTS_MANIFEST = [];

    /* ── Load post ── */
    (async function(){
      const params = new URLSearchParams(location.search);
      const file = params.get('file');
      const wrapper = document.getElementById('post-wrapper');

      if (!file) {
        wrapper.innerHTML = `<div class="post-error"> 파일 경로가 지정되지 않았습니다.<br>?file=posts/example.md 형식으로 접근하세요.</div>`;
        return;
      }

      try {
        const jsonRes = await fetch('posts.json');
        if (jsonRes.ok) {
          POSTS_MANIFEST = await jsonRes.json();
        }
      } catch (error) {
        console.warn("posts.json 로드 실패 (기본값으로 진행):", error);
      }

      const meta = POSTS_MANIFEST.find(p => p.file === file) || {};

      try {
        const res = await fetch(file);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        let markdown = await res.text();

        markdown = markdown.replace(/^---[\s\S]*?---\n?/, '').trim();

        const html = marked.parse(markdown);

        const title = meta.title || extractTitle(markdown) || file.split('/').pop().replace('.md','');
        const dateStr = meta.date
          ? new Date(meta.date).toLocaleDateString('ko-KR', {year:'numeric',month:'long',day:'numeric'})
          : '';
        const tags = (meta.tags||[]).map(t=>`<span class="post-header-tag">#${t}</span>`).join('');

        document.title = `Aurora — ${title}`;

        wrapper.innerHTML = `
          <div class="post-header">
            <div class="post-header-meta">
              ${meta.category ? `<span class="post-category-badge">${meta.category}</span>` : ''}
              ${dateStr ? `<span class="post-header-date">${dateStr}</span>` : ''}
            </div>
            <h1 class="post-header-title">${title}</h1>
            ${tags ? `<div class="post-header-tags">${tags}</div>` : ''}
          </div>
          <div class="post-body">${html}</div>
        `;
      } catch(err) {
        wrapper.innerHTML = `<div class="post-error">
          포스트를 불러올 수 없습니다.<br>
          <code>${file}</code><br><br>
          (${err.message})
        </div>`;
      }
    })();

    function extractTitle(md) {
      const m = md.match(/^#\s+(.+)/m);
      return m ? m[1] : null;
    }
  </script>
</body>
</html>
